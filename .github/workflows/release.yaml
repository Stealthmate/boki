name: Release
run-name: release
on:
  push:
    tags:
      - v0.*
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: |
          _TARGET="x86_64-unknown-linux-gnu"
          cargo build --target "${_TARGET}" --release
          _NAME="boki-${{github.ref_name}}-${_TARGET}"
          tar -C "target/${_TARGET}/release" -czvf "${_NAME}.tar.gz" boki
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release create \
            "${{github.ref_name}}" \
            --notes 'See [`docs/release-notes.md`](https://github.com/Stealthmate/boki/tree/${{github.ref_name}}/docs/release-notes.md)' \
            *.tar.gz
